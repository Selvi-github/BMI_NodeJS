<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic BMI Calculator</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            padding: 45px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-top: 5px solid #3b82f6;
        }

        .container:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.45);
        }

        h2 {
            text-align: center;
            margin-bottom: 35px;
            color: #0f172a;
            font-weight: 700;
            font-size: 26px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #475569;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease, box-shadow 0.3s ease, background-color 0.3s;
            background-color: #f8fafc;
            color: #1e293b;
        }

        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
            background-color: #fff;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            background: #1d4ed8;
            box-shadow: 0 6px 12px rgba(37, 99, 235, 0.3);
        }

        button:active {
            transform: scale(0.98);
        }

    </style>
</head>
<body>

<div class="container">
    <h2>FitTrack BMI Calculator</h2>
    <form action="/bmicalculator" method="POST">
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" name="Name" id="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label for="height">Height (m)</label>
            <input type="number" name="Height" id="height" step="0.01" placeholder="e.g., 1.75" required>
        </div>

        <div class="form-group">
            <label for="weight">Weight (kg)</label>
            <input type="number" name="Weight" id="weight" step="0.01" placeholder="e.g., 70.5" required>
        </div>

        <button type="submit">Calculate BMI</button>
    </form>
</div>

</body>
</html>
